[package]
name = "voice"
version = "0.2.0"
edition = "2021"
rust-version = "1.85.0"
description = "CLI for voice TTS — like say, but with Kokoro"
license = "MIT"
repository = "https://github.com/rgbkrk/voicers"
readme = "../../README.md"

[[bin]]
name = "voice"
path = "src/main.rs"

[dependencies]
voice-tts = { version = "0.2.0", path = "../voice-tts" }
voice-g2p = { version = "0.2.0", path = "../voice-g2p" }
clap = { version = "4", features = ["derive"] }
rodio = "0.22"
hound = "3"
pulldown-cmark = "0.13.1"
ctrlc = "3.5.2"
